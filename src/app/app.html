<header class="bg-dark py-3 shadow-sm mb-4">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
    
    <h1 class="text-white h4 mb-3 mb-md-0">🎮 Sala de Juegos</h1>
    
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <button class="btn btn-outline-light px-3" routerLink="/home" routerLinkActive="active">
        Inicio / Home
      </button>
      
      <button class="btn btn-outline-light px-3" routerLink="/whoami" routerLinkActive="active">
        Quién Soy
      </button>

      @if (authService.usuarioActual() === null) {
        <!-- <button class="btn btn-outline-light px-3" routerLink="/login" routerLinkActive="active">
          Login
        </button>
        <button class="btn btn-outline-light px-3" routerLink="/registro" routerLinkActive="active">
          Registro
        </button> -->
      } @else {
        <span class="text-info small mx-2">👤 {{ authService.usuarioActual().nombre }}</span>
        <button class="btn btn-sm btn-outline-danger px-3" (click)="authService.logout()">
          Cerrar Sesión
        </button>
      }

      <button class="btn btn-sm btn-secondary ms-md-2" (click)="toggleTheme()">
        {{ isDarkMode ? '☀️ Claro' : '🌙 Oscuro' }}
      </button>
    </div>

  </div>
</header>

<main class="container">
  <div class="card p-4 shadow-sm">
    <router-outlet></router-outlet>
  </div>
</main>
